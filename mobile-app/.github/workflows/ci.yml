name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Type-check + lint + unit tests ──────────────────────────────────────────
  check:
    name: Type-check · Lint · Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test -- --ci --coverage --reporters=default --reporters=github-actions

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          directory: mobile-app/coverage
          flags: unit
          fail_ci_if_error: false

  # ── Android build validation ─────────────────────────────────────────────────
  android-build:
    name: Android Debug Build
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile-app/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci
        working-directory: mobile-app

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('mobile-app/android/**/*.gradle*', 'mobile-app/android/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Build Android debug
        run: |
          cd mobile-app/android
          ./gradlew assembleDebug --no-daemon --stacktrace
