<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SetaLink — Auth</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg-void:#030609;--bg-base:#070D18;--bg-surface:#0D1828;--bg-elevated:#111F35;
  --border-subtle:rgba(255,255,255,0.05);--border-default:rgba(255,255,255,0.08);
  --border-glow:rgba(0,232,122,0.28);
  --emerald-400:#00E87A;--blue-400:#3399FF;
  --text-primary:#F0F6FF;--text-secondary:#8FA8C8;--text-muted:#3D5570;--text-inverse:#030609;
  --radius-md:12px;--radius-lg:16px;--radius-xl:20px;--radius-full:9999px;
}
body{
  background:radial-gradient(ellipse 800px 500px at 50% -60px,rgba(0,232,122,0.05),transparent 65%),#010204;
  display:flex;flex-direction:column;align-items:center;min-height:100vh;
  padding:48px 20px 60px;font-family:'Inter',system-ui,sans-serif;
}
.phone{
  width:390px;height:844px;border-radius:44px;overflow:hidden;position:relative;
  background:var(--bg-void);flex-shrink:0;
  border:1.5px solid rgba(255,255,255,0.1);
  box-shadow:0 0 0 1px rgba(0,0,0,0.7),0 40px 100px rgba(0,0,0,0.6),
             inset 0 1px 0 rgba(255,255,255,0.08);
}
.di{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:120px;height:34px;background:#000;border-radius:20px;z-index:100;}

/* Screen */
.screen{
  width:100%;height:100%;display:flex;flex-direction:column;
  background:var(--bg-void);overflow:hidden;position:relative;
}

/* Grid background */
.grid-bg{
  position:absolute;inset:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);
  background-size:28px 28px;
}
/* Diagonal light streak */
.light-streak{
  position:absolute;
  width:2px;height:300px;
  background:linear-gradient(to bottom,transparent,rgba(0,232,122,0.12),transparent);
  left:30%;top:-50px;transform:rotate(15deg);
  animation:streak-move 8s ease-in-out infinite;
  pointer-events:none;
}
@keyframes streak-move{
  0%,100%{opacity:0.25;transform:rotate(15deg) translateY(0);}
  50%{opacity:0.45;transform:rotate(15deg) translateY(30px);}
}

/* Status bar */
.status-bar{
  height:52px;padding:16px 24px 0;display:flex;align-items:center;
  justify-content:space-between;flex-shrink:0;position:relative;z-index:10;
}
.status-time{font-size:15px;font-weight:600;color:var(--text-primary);letter-spacing:-0.3px;}
.status-icons{display:flex;align-items:center;gap:6px;}

/* Scroll area */
.scroll-area{
  flex:1;overflow-y:auto;scrollbar-width:none;
  padding:16px 24px 32px;display:flex;flex-direction:column;gap:20px;
  position:relative;z-index:5;
}
.scroll-area::-webkit-scrollbar{display:none;}

/* Logo row */
.logo-row{display:flex;align-items:center;gap:10px;}
.logo-mark{
  width:34px;height:34px;border-radius:9px;
  background:var(--emerald-400);display:flex;align-items:center;justify-content:center;
  transform:rotate(45deg);flex-shrink:0;
  box-shadow:0 0 8px rgba(0,232,122,0.20);
}
.logo-mark span{
  transform:rotate(-45deg);font-size:16px;font-weight:700;
  color:var(--text-inverse);
}
.logo-name{
  font-size:17px;font-weight:600;color:var(--text-primary);letter-spacing:-0.4px;
}

/* Headline */
.headline{margin-top:4px;}
.hero-text{
  font-size:36px;font-weight:700;color:var(--text-primary);
  letter-spacing:-1.5px;line-height:1.08;
  animation:fade-up 0.5s ease 0.1s both;
}
.hero-sub{
  font-size:14px;color:var(--text-secondary);margin-top:8px;line-height:1.6;
  animation:fade-up 0.5s ease 0.2s both;
}

/* Tab row */
.tab-row{
  display:flex;background:var(--bg-surface);border-radius:var(--radius-lg);
  border:1px solid var(--border-default);padding:4px;gap:4px;
  animation:fade-up 0.5s ease 0.3s both;
}
.tab-btn{
  flex:1;padding:10px;border-radius:12px;display:flex;align-items:center;
  justify-content:center;cursor:pointer;transition:all 0.2s;
}
.tab-btn.active{
  background:var(--bg-elevated);
  border:1px solid var(--border-glow);
}
.tab-label{font-size:13px;font-weight:500;color:var(--text-muted);}
.tab-btn.active .tab-label{color:var(--emerald-400);}

/* Form */
.form{display:flex;flex-direction:column;gap:10px;animation:fade-up 0.5s ease 0.35s both;}

.input-wrap{
  background:var(--bg-surface);border-radius:var(--radius-lg);
  border:1px solid var(--border-default);
  padding:0 16px;height:52px;display:flex;align-items:center;gap:10px;
  transition:border-color 0.2s;
}
.input-wrap.focused{
  border-color:var(--emerald-400);
  box-shadow:0 0 0 2px rgba(0,232,122,0.08);
}
.input-icon{
  width:16px;height:16px;opacity:0.4;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;color:var(--text-muted);
}
.input-field{
  flex:1;font-size:15px;color:var(--text-primary);background:none;border:none;
  outline:none;font-family:'Inter',sans-serif;
}
.input-field::placeholder{color:var(--text-muted);}

.forgot-row{text-align:right;}
.forgot-link{font-size:13px;font-weight:500;color:var(--emerald-400);cursor:pointer;}

/* CTA button */
.cta-btn{
  height:54px;background:var(--emerald-400);border-radius:var(--radius-lg);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  box-shadow:0 0 14px rgba(0,232,122,0.18),0 4px 16px rgba(0,0,0,0.3);
  transition:transform 0.15s,box-shadow 0.15s;
  animation:fade-up 0.5s ease 0.4s both;
  position:relative;overflow:hidden;
}
.cta-btn::before{
  content:'';position:absolute;
  top:-50%;left:-50%;width:200%;height:200%;
  background:linear-gradient(45deg,transparent 40%,rgba(255,255,255,0.1) 50%,transparent 60%);
  animation:shimmer 3s ease-in-out infinite;
}
@keyframes shimmer{
  0%{transform:translateX(-100%);}
  40%{transform:translateX(50%);}
  100%{transform:translateX(-100%);}
}
.cta-btn:hover{transform:translateY(-1px);box-shadow:0 0 22px rgba(0,232,122,0.26),0 8px 20px rgba(0,0,0,0.35);}
.cta-btn:active{transform:scale(0.97);}
.cta-text{font-size:15px;font-weight:600;color:var(--text-inverse);letter-spacing:0.3px;}

/* Divider */
.divider{
  display:flex;align-items:center;gap:12px;
  animation:fade-up 0.5s ease 0.45s both;
}
.div-line{flex:1;height:1px;background:var(--border-subtle);}
.div-text{font-size:11px;color:var(--text-muted);letter-spacing:0.8px;white-space:nowrap;text-transform:uppercase;}

/* Alt row */
.alt-row{
  display:flex;gap:10px;
  animation:fade-up 0.5s ease 0.5s both;
}
.alt-btn{
  flex:1;height:52px;background:var(--bg-surface);border-radius:var(--radius-lg);
  border:1px solid var(--border-default);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:4px;cursor:pointer;
  transition:border-color 0.2s,background 0.2s;
}
.alt-btn:hover{border-color:var(--border-glow);background:rgba(0,232,122,0.04);}
.alt-icon{font-size:18px;color:var(--text-secondary);}
.alt-label{font-size:10px;font-weight:500;color:var(--text-muted);letter-spacing:0.4px;}

/* Terms */
.terms{
  font-size:11px;color:var(--text-muted);text-align:center;line-height:1.8;
  animation:fade-up 0.5s ease 0.55s both;
}
.terms a{color:var(--emerald-400);text-decoration:none;}

/* Trust badges */
.trust-row{
  display:flex;align-items:center;justify-content:center;gap:20px;
  animation:fade-up 0.5s ease 0.6s both;
}
.trust-item{display:flex;align-items:center;gap:5px;}
.trust-dot{width:5px;height:5px;border-radius:50%;background:var(--emerald-400);}
.trust-text{font-size:10px;color:var(--text-muted);letter-spacing:0.4px;}

@keyframes fade-up{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* Screen label */
.screen-label{margin-top:20px;font-size:11px;font-weight:500;color:rgba(255,255,255,0.22);letter-spacing:2px;text-transform:uppercase;text-align:center;}
</style>
</head>
<body>
<div class="phone">
  <div class="di"></div>
  <div class="screen">
    <div class="grid-bg"></div>
    <div class="light-streak"></div>

    <!-- Status bar -->
    <div class="status-bar">
      <span class="status-time">9:41</span>
      <div class="status-icons">
        <svg width="17" height="12" viewBox="0 0 17 12" fill="none">
          <rect x="0" y="4" width="3" height="8" rx="1" fill="#F0F6FF" opacity=".5"/>
          <rect x="4.5" y="2.5" width="3" height="9.5" rx="1" fill="#F0F6FF" opacity=".7"/>
          <rect x="9" y="1" width="3" height="11" rx="1" fill="#F0F6FF" opacity=".9"/>
          <rect x="13.5" y="0" width="3" height="12" rx="1" fill="#F0F6FF"/>
        </svg>
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
          <path d="M8 3C10.2 3 12.2 3.9 13.6 5.4L15 4C13.2 2.1 10.7 1 8 1S2.8 2.1 1 4l1.4 1.4C3.8 3.9 5.8 3 8 3z" fill="#F0F6FF"/>
          <path d="M8 6c1.3 0 2.4.5 3.3 1.3L12.6 6C11.4 4.8 9.8 4 8 4S4.6 4.8 3.4 6l1.3 1.3C5.6 6.5 6.7 6 8 6z" fill="#F0F6FF"/>
          <circle cx="8" cy="10" r="1.5" fill="#F0F6FF"/>
        </svg>
        <svg width="25" height="12" viewBox="0 0 25 12" fill="none">
          <rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="#F0F6FF" stroke-opacity=".35"/>
          <rect x="2" y="2" width="16" height="8" rx="2" fill="#F0F6FF"/>
          <path d="M23 4.5v3a2 2 0 000-3z" fill="#F0F6FF" fill-opacity=".4"/>
        </svg>
      </div>
    </div>

    <div class="scroll-area">
      <!-- Logo -->
      <div class="logo-row">
        <div class="logo-mark"><span>S</span></div>
        <span class="logo-name">SetaLink</span>
      </div>

      <!-- Headline -->
      <div class="headline">
        <div class="hero-text">Welcome<br>back.</div>
        <div class="hero-sub">Sign in to continue your<br>secure connection.</div>
      </div>

      <!-- Tab switcher -->
      <div class="tab-row">
        <div class="tab-btn active"><span class="tab-label">Sign In</span></div>
        <div class="tab-btn"><span class="tab-label">Create Account</span></div>
      </div>

      <!-- Form -->
      <div class="form">
        <div class="input-wrap focused">
          <div class="input-icon">✉</div>
          <input class="input-field" type="email" placeholder="Email address" value="khabat@setalink.io">
        </div>
        <div class="input-wrap">
          <div class="input-icon">🔒</div>
          <input class="input-field" type="password" placeholder="Password" value="••••••••••">
        </div>
        <div class="forgot-row">
          <span class="forgot-link">Forgot password?</span>
        </div>
      </div>

      <!-- CTA -->
      <div class="cta-btn">
        <span class="cta-text">Sign In</span>
      </div>

      <!-- Divider -->
      <div class="divider">
        <div class="div-line"></div>
        <span class="div-text">or continue with</span>
        <div class="div-line"></div>
      </div>

      <!-- Alt auth -->
      <div class="alt-row">
        <div class="alt-btn">
          <span class="alt-icon">G</span>
          <span class="alt-label">Google</span>
        </div>
        <div class="alt-btn">
          <span class="alt-icon">⊙</span>
          <span class="alt-label">Face ID</span>
        </div>
        <div class="alt-btn">
          <span class="alt-icon">⊞</span>
          <span class="alt-label">Invite Code</span>
        </div>
      </div>

      <!-- Terms -->
      <div class="terms">
        By continuing you agree to our
        <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
      </div>

      <!-- Trust -->
      <div class="trust-row">
        <div class="trust-item">
          <div class="trust-dot"></div>
          <span class="trust-text">AES-256</span>
        </div>
        <div class="trust-item">
          <div class="trust-dot"></div>
          <span class="trust-text">No Logs</span>
        </div>
        <div class="trust-item">
          <div class="trust-dot"></div>
          <span class="trust-text">TLS 1.3</span>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="screen-label">02 — Login / Register</div>
</body>
</html>
