<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SetaLink — Splash</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-void:#030609;--bg-base:#070D18;
  --emerald-400:#00E87A;--emerald-900:#002E16;
  --text-primary:#F0F6FF;--text-muted:#3D5570;
}
body{
  background:radial-gradient(ellipse 900px 600px at 50% -80px,rgba(0,232,122,0.06),transparent 65%),#010204;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  min-height:100vh;padding:48px 20px 60px;
  font-family:'Inter',system-ui,sans-serif;
}

/* Phone */
.phone{
  width:390px;height:844px;border-radius:44px;overflow:hidden;position:relative;
  background:#030609;flex-shrink:0;
  border:1.5px solid rgba(255,255,255,0.1);
  box-shadow:0 0 0 1px rgba(0,0,0,0.7),0 40px 100px rgba(0,0,0,0.65),
             inset 0 1px 0 rgba(255,255,255,0.09);
}

/* Dynamic island */
.di{
  position:absolute;top:12px;left:50%;transform:translateX(-50%);
  width:120px;height:34px;background:#000;border-radius:20px;z-index:100;
}

/* Screen */
.screen{
  width:100%;height:100%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;position:relative;overflow:hidden;
  background:var(--bg-void);
}

/* Background radial glow */
.bg-glow{
  position:absolute;
  width:360px;height:360px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(0,232,122,0.09) 0%,rgba(0,232,122,0.03) 50%,transparent 70%);
  top:50%;left:50%;transform:translate(-50%,-60%);
  animation:glow-pulse 3s ease-in-out infinite;
  pointer-events:none;
}

/* Floating particles */
.particle{
  position:absolute;border-radius:50%;background:var(--emerald-400);
  animation:float-p var(--dur,4s) ease-in-out infinite;
  animation-delay:var(--del,0s);
}
@keyframes float-p{
  0%,100%{transform:translateY(0) translateX(0);opacity:var(--opa,0.2);}
  33%{transform:translateY(calc(var(--fy,-14px)));opacity:calc(var(--opa,0.2)*2.5);}
  66%{transform:translateY(calc(var(--fy,-14px)*0.5)) translateX(8px);opacity:var(--opa,0.2);}
}

/* Subtle grid */
.grid-overlay{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);
  background-size:32px 32px;
  pointer-events:none;
}

/* Center content */
.center{
  display:flex;flex-direction:column;align-items:center;gap:20px;
  position:relative;z-index:10;
}

/* Logo mark */
.logo-wrap{
  position:relative;display:flex;align-items:center;justify-content:center;
  width:100px;height:100px;
  animation:scale-in 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
}
.logo-glow{
  position:absolute;
  width:110px;height:110px;border-radius:50%;
  background:radial-gradient(circle,rgba(0,232,122,0.14),transparent 70%);
  animation:glow-pulse 4s ease-in-out infinite;
}
.logo-ring-outer{
  position:absolute;width:88px;height:88px;border-radius:50%;
  border:1px solid rgba(0,232,122,0.14);
  animation:breathe-ring 4.5s ease-in-out infinite;
}
.logo-shape{
  width:64px;height:64px;
  border:1.5px solid var(--emerald-400);
  border-radius:16px;
  transform:rotate(45deg);
  background:rgba(0,232,122,0.06);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 14px rgba(0,232,122,0.14),inset 0 0 10px rgba(0,232,122,0.04);
  position:relative;
}
.logo-s{
  transform:rotate(-45deg);
  color:var(--emerald-400);
  font-size:26px;
  font-weight:300;
  letter-spacing:-1px;
  position:absolute;
  text-shadow:0 0 8px rgba(0,232,122,0.35);
}

/* Wordmark */
.wordmark{
  font-size:38px;font-weight:100;letter-spacing:-2px;color:var(--text-primary);
  animation:fade-up 0.5s ease 1s both;
  line-height:1;
}
.wordmark .accent{color:var(--emerald-400);}

/* Tagline */
.tagline{
  font-size:10px;font-weight:500;letter-spacing:4px;
  color:var(--text-muted);text-transform:uppercase;
  animation:fade-up 0.5s ease 1.4s both;
}

/* Loading bar */
.loading-bar-wrap{
  width:120px;height:2px;background:rgba(255,255,255,0.06);
  border-radius:2px;overflow:hidden;margin-top:8px;
  animation:fade-up 0.4s ease 1.7s both;
}
.loading-bar{
  height:100%;width:100%;background:linear-gradient(90deg,transparent,var(--emerald-400),transparent);
  animation:loading-sweep 2s ease-in-out 1.8s infinite;
  border-radius:2px;
}
@keyframes loading-sweep{
  0%{transform:translateX(-100%);}
  100%{transform:translateX(100%);}
}

/* Version */
.version{
  position:absolute;bottom:40px;
  font-size:11px;color:rgba(61,85,112,0.5);
  font-family:'JetBrains Mono',monospace;
  animation:fade-up 0.5s ease 1.6s both;
  letter-spacing:1px;
}

/* Animations */
@keyframes scale-in{
  from{opacity:0;transform:scale(0.6);}
  to{opacity:1;transform:scale(1);}
}
@keyframes fade-up{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}
@keyframes glow-pulse{
  0%,100%{opacity:0.8;}
  50%{opacity:1.2;}
}
@keyframes breathe-ring{
  0%,100%{transform:scale(1);opacity:0.20;}
  50%{transform:scale(1.12);opacity:0;}
}

/* Page label */
.screen-label{
  margin-top:20px;font-size:11px;font-weight:500;
  color:rgba(255,255,255,0.22);letter-spacing:2px;text-transform:uppercase;
  text-align:center;
}
</style>
</head>
<body>
<div class="phone">
  <div class="di"></div>
  <div class="screen">
    <div class="bg-glow"></div>
    <div class="grid-overlay"></div>

    <!-- Particles -->
    <div class="particle" style="width:3px;height:3px;left:15%;top:18%;--dur:5s;--del:0s;--opa:0.18;--fy:-20px;"></div>
    <div class="particle" style="width:2px;height:2px;left:25%;top:70%;--dur:4s;--del:0.8s;--opa:0.15;--fy:-12px;"></div>
    <div class="particle" style="width:4px;height:4px;left:78%;top:25%;--dur:6s;--del:1.2s;--opa:0.22;--fy:-18px;"></div>
    <div class="particle" style="width:2px;height:2px;left:85%;top:60%;--dur:5.5s;--del:0.4s;--opa:0.12;--fy:-10px;"></div>
    <div class="particle" style="width:3px;height:3px;left:55%;top:82%;--dur:4.5s;--del:1.6s;--opa:0.20;--fy:-16px;"></div>
    <div class="particle" style="width:2px;height:2px;left:40%;top:12%;--dur:5s;--del:0.6s;--opa:0.14;--fy:-14px;"></div>
    <div class="particle" style="width:3px;height:3px;left:65%;top:88%;--dur:6.5s;--del:2s;--opa:0.18;--fy:-22px;"></div>
    <div class="particle" style="width:2px;height:2px;left:8%;top:45%;--dur:4.2s;--del:1s;--opa:0.12;--fy:-10px;"></div>
    <div class="particle" style="width:3px;height:3px;left:90%;top:78%;--dur:5.8s;--del:0.3s;--opa:0.15;--fy:-16px;"></div>
    <div class="particle" style="width:2px;height:2px;left:32%;top:92%;--dur:4.8s;--del:1.8s;--opa:0.10;--fy:-8px;"></div>

    <!-- Center logo -->
    <div class="center">
      <div class="logo-wrap">
        <div class="logo-glow"></div>
        <div class="logo-ring-outer"></div>
        <div class="logo-shape">
          <span class="logo-s">S</span>
        </div>
      </div>

      <div class="wordmark"><span class="accent">S</span>eta<span class="accent">L</span>ink</div>

      <div class="tagline">Intelligent Connectivity</div>

      <div class="loading-bar-wrap">
        <div class="loading-bar"></div>
      </div>
    </div>

    <div class="version">v1.0.0</div>
  </div>
</div>
<div class="screen-label">01 — Splash Screen</div>
</body>
</html>
