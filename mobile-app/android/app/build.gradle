apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

// Load release signing credentials from keystore.properties (not committed to git)
def keystorePropsFile = rootProject.file("keystore.properties")
def keystoreProps     = new Properties()
if (keystorePropsFile.exists()) {
    keystoreProps.load(new FileInputStream(keystorePropsFile))
}

react {
    entryFile      = file("../../index.js")
    reactNativeDir = file("$rootDir/../node_modules/react-native")
    hermesCommand  = "$rootDir/../node_modules/react-native/sdks/hermesc/linux64-bin/hermesc"
    codegenDir     = file("$rootDir/../node_modules/@react-native/codegen")
    autolinkLibrariesWithApp()
}

android {
    namespace          "com.setalink"
    compileSdk         rootProject.ext.compileSdkVersion
    buildToolsVersion  rootProject.ext.buildToolsVersion
    ndkVersion         rootProject.ext.ndkVersion

    defaultConfig {
        applicationId "com.setalink"
        minSdk         rootProject.ext.minSdkVersion
        targetSdk      rootProject.ext.targetSdkVersion
        versionCode    2
        versionName    "0.2.0"

        manifestPlaceholders = [appLabel: "@string/app_name"]
    }

    signingConfigs {
        debug {
            storeFile     file("debug.keystore")
            storePassword "android"
            keyAlias      "androiddebugkey"
            keyPassword   "android"
        }
        release {
            storeFile     file(keystoreProps['storeFile'] ?: 'release.keystore')
            storePassword keystoreProps['storePassword'] ?: ''
            keyAlias      keystoreProps['keyAlias']      ?: ''
            keyPassword   keystoreProps['keyPassword']   ?: ''
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig    signingConfigs.release
            minifyEnabled    false
            shrinkResources  false
            proguardFiles    getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }

    // Per-architecture APKs — each is ~40 % smaller than a fat universal APK.
    // For sideloading: use arm64-v8a (most Android phones since 2015).
    splits {
        abi {
            enable         true
            reset()
            include        'arm64-v8a'
            universalApk   false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    // Prevent NDK from stripping our standalone ELF executables packaged as .so
    // and force extraction to nativeLibraryDir on install (not compressed in APK).
    packagingOptions {
        doNotStrip "*/arm64-v8a/libxray.so"
        doNotStrip "*/arm64-v8a/libtun2socks.so"
        jniLibs {
            useLegacyPackaging true
        }
    }

    lint {
        checkReleaseBuilds false
        abortOnError false
    }
}

dependencies {
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")

    // Kotlin
    implementation("org.jetbrains.kotlin:kotlin-stdlib:${rootProject.ext.kotlinVersion}")
    implementation("org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.1")

    // AndroidX
    implementation("androidx.core:core-ktx:1.13.1")
    implementation("androidx.appcompat:appcompat:1.7.0")
    implementation("androidx.lifecycle:lifecycle-runtime-ktx:2.8.4")
}
