apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

react {
    // JS bundle entry point
    entryFile = file(["node", "-e", "require('expo/scripts/resolveAppEntry')", rootDir.getAbsolutePath(), "android", "absolute"].execute(null, rootDir).text.trim())
    reactNativeDir = file("$rootDir/../node_modules/react-native")
    hermesCommand  = "$rootDir/../node_modules/react-native/sdks/hermesc/%OS_ARCH%/hermesc"
    codegenDir     = file("$rootDir/../node_modules/@react-native/codegen")
}

android {
    namespace          "com.setalink"
    compileSdk         rootProject.ext.compileSdkVersion
    buildToolsVersion  rootProject.ext.buildToolsVersion
    ndkVersion         rootProject.ext.ndkVersion

    defaultConfig {
        applicationId "com.setalink"
        minSdk         rootProject.ext.minSdkVersion
        targetSdk      rootProject.ext.targetSdkVersion
        versionCode    1
        versionName    "1.0.0"

        manifestPlaceholders = [appLabel: "@string/app_name"]
    }

    signingConfigs {
        debug {
            storeFile     file("debug.keystore")
            storePassword "android"
            keyAlias      "androiddebugkey"
            keyPassword   "android"
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            minifyEnabled  true
            proguardFiles  getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
            signingConfig  signingConfigs.debug  // replace with release keystore before publishing
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }
}

dependencies {
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")

    // Kotlin
    implementation("org.jetbrains.kotlin:kotlin-stdlib:${rootProject.ext.kotlinVersion}")
    implementation("org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.1")

    // AndroidX
    implementation("androidx.core:core-ktx:1.13.1")
    implementation("androidx.appcompat:appcompat:1.7.0")
    implementation("androidx.lifecycle:lifecycle-runtime-ktx:2.8.4")

    // Notification channel
    implementation("androidx.core:core-ktx:1.13.1")
}
